<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>User Form</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>

<div class="container">

    <h2>User Form</h2>

    <form th:action="@{/save}" th:object="${user}" method="post">

        <input type="hidden" th:field="*{id}" />

        <div class="form-group">
            <label>Name</label>
            <input type="text" th:field="*{name}" placeholder="Enter name" required />
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" th:field="*{email}" placeholder="Enter email" required />
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="text" th:field="*{phone}" placeholder="Enter phone" required />
        </div>

        <button class="btn btn-save" type="submit">Save</button>

        <a class="btn btn-add" href="/">Back</a>

    </form>

</div>

</body>
</html>
